<div class="edit-page">
  <div class="edit-wrapper">
    <h2>Termék szerkesztése</h2>

    <form class="edit-form" (ngSubmit)="save()">
      <label class="field">
        <span>Cikkszám</span>
        <input type="text" name="sku" [(ngModel)]="form.sku" required />
      </label>

      <label class="field">
        <span>Név</span>
        <input type="text" name="name" [(ngModel)]="form.name" required />
      </label>

      <label class="field">
        <span>Leírás</span>
        <input type="text" name="description" [(ngModel)]="form.description" required />
      </label>

      <div class="row-2">
        <label class="field">
          <span>Ár (Ft)</span>
          <input type="number" name="price" [(ngModel)]="form.price" min="0" required />
        </label>

        <label class="field">
          <span>Alacsony készlet küszöb</span>
          <input type="number" name="lowStockThreshold" [(ngModel)]="form.lowStockThreshold" min="0" required />
        </label>
      </div>

      <ng-container *ngIf="compartmentsVm$ | async as compartmentsVm">
        <div class="storage-block">
          <label class="field">
            <span>Elsődleges tárolóhely</span>
            <select name="editPrimaryStorageSelection" [(ngModel)]="primaryStorageSelection" [disabled]="compartmentsVm.loading" required>
              <option value="">-- Válassz tárolóhelyet --</option>
              <option
                *ngFor="let comp of compartmentsVm.items"
                [value]="comp.id"
                [disabled]="isPrimaryCompartmentDisabled(comp.id)"
              >
                {{ comp.id }}
              </option>
            </select>
          </label>

          <div class="selected-id" *ngIf="primaryStorageSelection">
            Kiválasztott azonosító: {{ primaryStorageSelection }}
          </div>
        </div>

        <div class="storage-block" *ngFor="let storageId of secondaryStorageSelections; let i = index">
          <label class="field">
            <span>Másodlagos tárolóhely {{ i + 1 }}</span>
            <select [name]="'editSecondaryStorageSelection' + i" [(ngModel)]="secondaryStorageSelections[i]" [disabled]="compartmentsVm.loading">
              <option value="">-- Válassz tárolóhelyet --</option>
              <option
                *ngFor="let comp of compartmentsVm.items"
                [value]="comp.id"
                [disabled]="isCompartmentUsedInSecondary(comp.id, i)"
              >
                {{ comp.id }}
              </option>
            </select>
          </label>

          <div class="selected-id" *ngIf="secondaryStorageSelections[i]">
            Kiválasztott azonosító: {{ secondaryStorageSelections[i] }}
          </div>

          <button
            type="button"
            class="link-btn remove-btn danger"
            (click)="removeStorageSelection(i)"
          >
            Tárolóhely törlése
          </button>
        </div>

        <div *ngIf="compartmentsVm.error" class="error-text">A tárolóhelyek betöltése nem sikerült.</div>
      </ng-container>

      <div class="storage-actions">
        <button type="button" class="link-btn" (click)="addStorageSelection()">+ Plusz tárolóhely hozzáadása</button>
      </div>

      <div *ngIf="errorText" class="error-text">{{ errorText }}</div>

      <div class="form-actions">
        <a routerLink="/products" class="back-btn">Mégse</a>
        <button type="submit" class="create-btn" [disabled]="saving">
          {{ saving ? 'Mentés...' : 'Mentés' }}
        </button>
      </div>
    </form>
  </div>
</div>
