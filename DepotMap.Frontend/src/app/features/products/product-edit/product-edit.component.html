<div class="app-page product-edit-page">
  <app-page-header
    title="Termék szerkesztése"
    subtitle="A kiválasztott termék adatainak és tárolóhelyeinek módosítása"
  >
  </app-page-header>

  <app-content-card title="Szerkesztési adatok" [soft]="true">
    <form class="edit-form" (ngSubmit)="save()">
      <div class="app-form-grid">
        <label class="field">
          <span>Cikkszám</span>
          <input type="text" name="sku" [(ngModel)]="form.sku" required />
        </label>

        <label class="field">
          <span>Név</span>
          <input type="text" name="name" [(ngModel)]="form.name" required />
        </label>

        <label class="field">
          <span>Leírás</span>
          <input type="text" name="description" [(ngModel)]="form.description" required />
        </label>

        <div class="row-2">
          <label class="field">
            <span>Ár (Ft)</span>
            <input type="number" name="price" [(ngModel)]="form.price" min="0" required />
          </label>

          <label class="field">
            <span>Alacsony készlet küszöb</span>
            <input
              type="number"
              name="lowStockThreshold"
              [(ngModel)]="form.lowStockThreshold"
              min="0"
              required
            />
          </label>
        </div>
      </div>

      <ng-container *ngIf="compartmentsVm$ | async as compartmentsVm">
        <div class="storage-section">
          <div class="storage-card">
            <label class="field">
              <span>Elsődleges tárolóhely</span>
              <select
                name="editPrimaryStorageSelection"
                [(ngModel)]="primaryStorageSelection"
                [compareWith]="compareCompartments"
                [disabled]="compartmentsVm.loading"
                required
              >
                <option [ngValue]="null">-- Válassz tárolóhelyet --</option>
                <option
                  *ngFor="let comp of compartmentsVm.items"
                  [ngValue]="comp"
                  [disabled]="isPrimaryCompartmentDisabled(comp.id)"
                >
                  {{ comp.code }}
                </option>
              </select>
            </label>

            <div class="selected-id" *ngIf="primaryStorageSelection">
              Kiválasztott tárolóhely: {{ primaryStorageSelection.code }}
            </div>
          </div>

          <div
            class="storage-card"
            *ngFor="let storageId of secondaryStorageSelections; let i = index"
          >
            <label class="field">
              <span>Másodlagos tárolóhely {{ i + 1 }}</span>
              <select
                [name]="'editSecondaryStorageSelection' + i"
                [(ngModel)]="secondaryStorageSelections[i]"
                [compareWith]="compareCompartments"
                [disabled]="compartmentsVm.loading"
              >
                <option [ngValue]="null">-- Válassz tárolóhelyet --</option>
                <option
                  *ngFor="let comp of compartmentsVm.items"
                  [ngValue]="comp"
                  [disabled]="isCompartmentUsedInSecondary(comp.id, i)"
                >
                  {{ comp.code }}
                </option>
              </select>
            </label>

            <div class="selected-id" *ngIf="secondaryStorageSelections[i]">
              Kiválasztott tárolóhely: {{ secondaryStorageSelections[i]?.code }}
            </div>

            <button
              type="button"
              class="btn btn-outline-danger btn-sm storage-remove-btn"
              (click)="removeStorageSelection(i)"
            >
              Tárolóhely törlése
            </button>
          </div>

          <div *ngIf="compartmentsVm.error" class="app-error">
            A tárolóhelyek betöltése nem sikerült.
          </div>
        </div>
      </ng-container>

      <div class="storage-actions">
        <button
          type="button"
          class="link-btn storage-add-btn"
          (click)="addStorageSelection()"
        >
          <i class="bi bi-plus-circle me-1"></i>
          Plusz tárolóhely hozzáadása
        </button>
      </div>

      <div *ngIf="errorText" class="app-error">{{ errorText }}</div>

      <div class="app-form-actions">
        <a routerLink="/products" class="btn btn-outline-secondary">Mégse</a>

        <button type="submit" class="btn btn-success" [disabled]="saving">
          {{ saving ? 'Mentés...' : 'Mentés' }}
        </button>
      </div>
    </form>
  </app-content-card>
</div>
