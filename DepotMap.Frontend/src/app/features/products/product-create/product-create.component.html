<div class="create-page">
  <div class="create-wrapper">
    <h2>Termék létrehozása</h2>
    <p class="subtitle">Add meg a termék alapadatait, majd mentsd el.</p>

    <form (ngSubmit)="create()" #createForm="ngForm" class="create-form">
      <label class="field">
        <span>Cikkszám</span>
        <input
          type="text"
          name="sku"
          [(ngModel)]="form.sku"
          placeholder="Pl. MON-042"
          required
        />
      </label>

      <label class="field">
        <span>Név</span>
        <input
          type="text"
          name="name"
          [(ngModel)]="form.name"
          placeholder="Pl. LG 27 monitor"
          required
        />
      </label>

      <label class="field">
        <span>Leírás</span>
        <input
          type="text"
          name="description"
          [(ngModel)]="form.description"
          placeholder="Rövid leírás"
          required
        />
      </label>

      <div class="row-2">
        <label class="field">
          <span>Ár (Ft)</span>
          <input
            type="number"
            name="price"
            [(ngModel)]="form.price"
            placeholder="0"
            required
            min="0"
          />
        </label>

        <label class="field">
          <span>Alacsony készlet küszöb</span>
          <input
            type="number"
            name="lowStockThreshold"
            [(ngModel)]="form.lowStockThreshold"
            placeholder="0"
            required
            min="0"
          />
        </label>
      </div>

      <div class="storage-block" *ngFor="let storageId of storageSelections; let i = index">
        <label class="field">
          <span>{{ i === 0 ? 'Elsődleges tárolóhely' : 'Másodlagos tárolóhely ' + i }}</span>
          <select
            [name]="'storageSelection' + i"
            [(ngModel)]="storageSelections[i]"
            required
          >
            <option value="">-- Válassz tárolóhelyet --</option>
            <option
              *ngFor="let comp of compartments"
              [value]="comp.id"
              [disabled]="isCompartmentUsed(comp.id, i)"
            >
              {{ comp.code }} (szint {{ comp.levelIndex }}, hely {{ comp.slotIndex }})
            </option>
          </select>
        </label>

        <button
          type="button"
          class="link-btn remove-btn"
          *ngIf="i > 0"
          (click)="removeStorageSelection(i)"
        >
          - Másodlagos tárolóhely törlése
        </button>
      </div>

      <div class="storage-actions">
        <button type="button" class="link-btn" (click)="addStorageSelection()">+ Plusz tárolóhely hozzáadása</button>
      </div>

      <div class="error-text" *ngIf="errorText">{{ errorText }}</div>

      <div class="form-actions">
        <a routerLink="/products" class="back-btn">Vissza</a>
        <button type="submit" class="create-btn" [disabled]="saving">
          {{ saving ? 'Létrehozás folyamatban...' : 'Létrehozás' }}
        </button>
      </div>
    </form>
  </div>
</div>
