<div class="cell-shelf-resolver-page p-4 text-center">
  <div *ngIf="loading && !error" class="state-msg">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Betöltés...</span>
    </div>
    <p class="mt-3 text-muted">
      {{ creating ? 'Polc létrehozása...' : 'Polc betöltése...' }}
    </p>
  </div>

  <div *ngIf="error" class="state-msg">
    <p class="text-danger mb-3">{{ errorMessage || 'Nem sikerült betölteni a polcot.' }}</p>
    <button class="btn btn-outline-primary" (click)="goToWarehouse()">
      <i class="bi bi-arrow-left"></i> Vissza a raktárhoz
    </button>
  </div>
</div>
