<div class="warehouse-list">
  <div class="header">
    <h2>Raktárak</h2>
    <button class="btn btn-primary" (click)="toggleCreateForm()">
      {{ showCreateForm ? 'Mégse' : 'Új raktár' }}
    </button>
  </div>

  <div class="create-form" *ngIf="showCreateForm">
    <div class="form-row">
      <div class="form-group">
        <label for="wh-name">Név</label>
        <input id="wh-name" type="text" class="form-control" placeholder="Raktár neve"
               [(ngModel)]="newName" />
      </div>
      <div class="form-group form-group-sm">
        <label for="wh-width">Szélesség</label>
        <input id="wh-width" type="number" class="form-control" min="1" max="200"
               [(ngModel)]="newGridWidth" />
      </div>
      <div class="form-group form-group-sm">
        <label for="wh-height">Magasság</label>
        <input id="wh-height" type="number" class="form-control" min="1" max="200"
               [(ngModel)]="newGridHeight" />
      </div>
      <button class="btn btn-success btn-create" (click)="createWarehouse()" [disabled]="creating">
        {{ creating ? 'Létrehozás...' : 'Létrehozás' }}
      </button>
    </div>
  </div>

  <ng-container *ngIf="warehousesVm$ | async as vm">
    <div *ngIf="vm.loading" class="spinner">Betöltés...</div>
    <div *ngIf="!vm.loading && vm.error" class="error-text">
      A raktárak nem töltődtek be. Ellenőrizd, hogy a backend fut-e.
    </div>

    <div *ngIf="!vm.loading && !vm.error && vm.items.length === 0" class="empty-text">
      Még nincs raktár. Hozz létre egyet az „Új raktár" gombbal!
    </div>

    <div class="cards">
      <div class="card" *ngFor="let w of vm.items" (click)="openWarehouse(w.id)">
        <div class="card-body">
          <h5 class="card-title">{{ w.name }}</h5>
          <p class="card-meta">{{ w.gridWidth }} × {{ w.gridHeight }} cella</p>
          <div class="card-actions">
            <button class="btn btn-sm btn-outline-secondary" (click)="openWarehouse(w.id); $event.stopPropagation()">
              Megnyitás
            </button>
            <button class="btn btn-sm btn-danger" (click)="deleteWarehouse(w.id, $event)">
              Törlés
            </button>
          </div>
        </div>
      </div>
    </div>
  </ng-container>
</div>
