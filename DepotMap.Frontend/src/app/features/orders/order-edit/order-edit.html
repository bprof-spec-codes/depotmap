<div class="app-page order-edit-page">
  <app-page-header title="Rendelés szerkesztése" subtitle="A rendelés tételeinek módosítása és új tételek hozzáadása">
  </app-page-header>

  <div *ngIf="isLoading" class="app-loading">
    Rendelés adatainak betöltése...
  </div>

  <app-content-card *ngIf="!isLoading" title="Szerkesztési adatok" [soft]="true">
    <div class="order-id-banner">
      Rendelés azonosítója: <strong>{{ orderId }}</strong>
    </div>

    <div class="existing-items-section" *ngIf="editingItems.length > 0">
      <div class="section-header">
        <h3 class="section-title">Jelenlegi tételek</h3>
      </div>

      <div class="editing-items-list">
        <div class="edit-row" *ngFor="let item of editingItems; let i = index">
          <div class="form-group">
            <label>Cikkszám (SKU) *</label>
            <input type="text" class="form-control" [(ngModel)]="item.productSKU">
          </div>

          <div class="form-group">
            <label>Mennyiség *</label>
            <input type="number" class="form-control" min="1" [(ngModel)]="item.quantity">
          </div>

          <div class="form-group">
            <label>Forrás rekesz</label>
            <input type="text" class="form-control" [(ngModel)]="item.fromCompartmentCode">
          </div>

          <div class="form-group d-flex align-items-end">
            <button class="btn btn-outline-danger row-remove-btn" (click)="removeItem(i)" title="Tétel törlése">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>
      <hr class="my-4">
    </div>


    <div class="new-item-section">
      <div class="section-header">
        <h3 class="section-title">Új tétel hozzáadása</h3>
      </div>
      <div class="active-row">
        <div class="form-group">
          <label>Cikkszám (SKU) *</label>
          <input type="text" class="form-control" placeholder="pl. PROD-1" [(ngModel)]="currentRow.productSKU">
        </div>

        <div class="form-group">
          <label>Mennyiség *</label>
          <input type="number" class="form-control" min="1" [(ngModel)]="currentRow.quantity">
        </div>

        <div class="form-group">
          <label>Forrás rekesz</label>
          <input type="text" class="form-control" placeholder="pl. COMP-1" [(ngModel)]="currentRow.fromCompartmentCode">
        </div>

        <div class="row-action">
          <button type="button" class="btn btn-outline-primary add-row-btn" (click)="addNewItem()">
            <i class="bi bi-plus-circle"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="app-form-actions order-edit-actions">
      <button
        class="btn btn-danger"
        type="button"
        [disabled]="isSaving"
        (click)="discardOrder()"
      >
        Szerkesztés elvetése
      </button>

      <button
        class="btn btn-success"
        type="button"
        [disabled]="isSaving"
        (click)="saveOrder()"
      >
        {{ isSaving ? 'Mentés folyamatban...' : 'Szerkesztés mentése' }}
      </button>
    </div>
  </app-content-card>
</div>
