<div class="app-page order-create-page">
  <app-page-header title="Új rendelés összeállítása"
    subtitle="Adj hozzá tételeket a rendeléshez, majd mentsd el a végleges listát.">
  </app-page-header>

  <app-content-card title="Rendelési adatok" [soft]="true">
    <div class="added-items-section" *ngIf="addedItems.length > 0">
      <div class="section-header">
        <h3 class="section-title">A rendelésbe szánt tételek</h3>
      </div>
      <div class="saved-row" *ngFor="let item of addedItems; let i = index">
        <div class="row-num">{{ i + 1 }}.</div>

        <div class="col-data">
          <span class="data-label">Cikkszám (SKU)</span>
          <strong>{{ item.productSKU }}</strong>
        </div>

        <div class="col-data">
          <span class="data-label">Mennyiség</span>
          <strong>{{ item.quantity }} db</strong>
        </div>

        <div class="col-data">
          <span class="data-label">Forrás rekesz</span>
          <strong>{{ item.fromCompartmentCode || '-' }}</strong>
        </div>

        <button class="btn btn-sm btn-outline-danger row-remove-btn" type="button" (click)="removeItem(i)"
          title="Tétel törlése">
          <i class="bi bi-trash"></i>
        </button>
      </div>
      <hr class="my-4">
    </div>

    <div class="new-item-section">
      <div class="section-header">
        <h3 class="section-title">Új tétel hozzáadása</h3>
      </div>

      <div class="active-row d-flex flex-wrap gap-3 align-items-end">
        
        <div class="form-group flex-grow-1" style="min-width: 250px;">
          <label>Termék kiválasztása *</label>
          <select class="form-select" 
                  [(ngModel)]="currentRow.productSKU" 
                  (ngModelChange)="onProductChange()"
                  [disabled]="productsLoading">
            <option value="">Válassz terméket...</option>
            <option *ngFor="let p of availableProducts" [value]="p.sku">
              {{ p.sku }} - {{ p.name }}
            </option>
          </select>
        </div>

        <div class="form-group" style="width: 120px;">
          <label>Mennyiség *</label>
          <input type="number" class="form-control" min="1" [(ngModel)]="currentRow.quantity" />
        </div>

        <div class="form-group flex-grow-1" style="min-width: 200px;">
          <label>Forrás rekesz *</label>
          <select class="form-select" 
                  [(ngModel)]="currentRow.fromCompartmentCode" 
                  [disabled]="compartmentsLoading || !currentRow.productSKU">
            <option value="">Válassz rekeszt...</option>
            <option *ngFor="let c of getCompartmentsForProductSKU(currentRow.productSKU)" [value]="c.code">
              {{ c.code }}
            </option>
          </select>
        </div>

      </div>

      <div class="add-item-actions">
        <button class="link-btn add-item-btn" type="button" (click)="addNewItem()">
          <i class="bi bi-plus-circle me-1"></i>
          Új tétel hozzáadása a listához
        </button>
      </div>
    </div>

    <div class="app-form-actions order-create-actions">
      <button class="btn btn-outline-secondary" type="button" [disabled]="isSaving" (click)="discardOrder()">
        Vissza
      </button>

      <button class="btn btn-primary" type="button" [disabled]="isSaving" (click)="saveOrder()">
        {{ isSaving ? 'Mentés folyamatban...' : 'Mentése' }}
      </button>
    </div>
  </app-content-card>
</div>
