<section class="login-landing">
    <div class="bg-orb orb-left"></div>
    <div class="bg-orb orb-right"></div>

    <div class="landing-content">
        <div class="brand-block">
            <div class="brand-chip">DepotMap</div>
            <h1>Raktárkezelés egy helyen</h1>
            <p>
                Kezeld a készletmozgásokat, beszerzéseket és rendeléseket
                átláthatóan. Lépj be a rendszerbe a folytatáshoz.
            </p>
        </div>

        <div class="login-card">
            <h2>Bejelentkezés</h2>
            <p class="login-subtitle">Add meg a felhasználói adataidat.</p>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <div class="field-group">
                    <label for="identifier">Felhasználói azonosító</label>
                    <input
                        id="identifier"
                        formControlName="identifier"
                        type="text"
                        placeholder="pl. minta.felhasználó"
                    />
                </div>

                <div class="field-group">
                    <label for="password">Jelszó</label>
                    <input
                        id="password"
                        formControlName="password"
                        type="password"
                        placeholder="Jelszó"
                    />
                </div>

                @if (errorMessage) {
                    <div class="error-box" role="alert">{{ errorMessage }}</div>
                }

                <button type="submit" [disabled]="loginForm.invalid">Belépés a rendszerbe</button>
            </form>
        </div>
    </div>
</section>
