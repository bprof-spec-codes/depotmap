<nav class="navbar navbar-expand-lg depotmap-navbar">
    <div class="container">

        <!--Ez funkcionál logoként jelenleg :D-->
        <a class="navbar-brand depotmap-logo" routerLink="/">depotmap</a>

        <!--Ez mobilra, reszponzivitásért-->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
            aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">

            <!--Ha a felhasználó nincs bejelentkezve-->
            <div *ngIf="!(isLoggedIn$ | async)" class="ms-auto">
                <app-login-component></app-login-component>
            </div>

            <!--Ha a felhasználó bejelentkezett-->
            <ul *ngIf="isLoggedIn$ | async" class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item" *ngFor="let item of navItems">
                    <a class="nav-link depotmap-nav-link" [routerLink]="item.route" routerLinkActive="active">
                        {{ item.label }}
                    </a>
                </li>
                <li class="nav-item ms-3 d-flex align-items-center">
                    <i class="bi bi-box-arrow-right fs-4 text-danger" (click)="onLogout()" role="button" title="Kijelentkezés"
                        style="cursor: pointer">
                    </i>
                </li>
            </ul>

        </div>

    </div>
</nav>
